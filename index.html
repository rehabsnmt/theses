<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lưu Trữ Luận Văn</title>
    <style>
        /* CSS Cơ bản */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1e40af; text-align: center; margin-top: 0; }
        
        /* Form & Input */
        input, select, button { padding: 10px 12px; margin: 5px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        
        /* Buttons */
        button { background-color: #2563eb; color: white; border: none; cursor: pointer; font-weight: 600; transition: background-color 0.2s; }
        button:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-warning:hover { background-color: #d97706; }
        .btn-sm { padding: 6px 10px; font-size: 12px; margin: 2px; }
        
        /* Layout */
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f1f5f9; }
        .section-box { background: #eff6ff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #bfdbfe; }
        .hidden { display: none !important; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: bold; color: #475569; margin-left: 5px; margin-bottom: 2px; }
        
        /* Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; white-space: nowrap; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; font-weight: 600; color: #475569; text-transform: uppercase; font-size: 13px; }
        tr:hover { background-color: #f1f5f9; }
        .tag { background: #dbeafe; color: #1e40af; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        
        /* Modal Overlay */
        #editModeBadge { background-color: #f59e0b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h1 style="margin: 0;">Hệ Thống Luận Văn</h1>
        <div>
            <button id="btnLoginShow">Đăng nhập Admin</button>
            <button id="btnLogout" class="btn-danger hidden">Đăng xuất</button>
        </div>
    </div>

    <!-- Khung Đăng nhập (Mặc định ẩn) -->
    <div id="loginSection" class="section-box hidden" style="max-width: 400px; margin: 0 auto 20px auto;">
        <h3 style="margin-top: 0; text-align: center;">Đăng nhập Quản trị viên</h3>
        <input type="email" id="email" placeholder="Email admin" style="width: 100%;">
        <input type="password" id="password" placeholder="Mật khẩu" style="width: 100%;">
        <button id="btnLoginSubmit" style="width: 100%;">Đăng nhập</button>
    </div>

    <!-- Khung Thêm/Sửa Đề Tài (Chỉ Admin mới thấy) -->
    <div id="adminSection" class="section-box hidden">
        <h3 style="margin-top: 0;">
            <span id="formTitle">Thêm đề tài mới</span>
            <span id="editModeBadge" class="hidden">Đang sửa dữ liệu</span>
        </h3>
        
        <!-- Lưu ID ngầm khi đang ở chế độ Sửa -->
        <input type="hidden" id="editId">
        
        <div class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label>Tên đề tài *</label>
                <input type="text" id="addTitle" placeholder="Nhập tên đề tài..." style="width: 100%;">
            </div>
            <div class="form-group">
                <label>Tác giả *</label>
                <input type="text" id="addAuthor" placeholder="Họ và tên sinh viên" style="width: 100%;">
            </div>
            <div class="form-group">
                <label>Lớp *</label>
                <div style="display: flex; gap: 5px;">
                    <select id="addLevel" style="width: 55%; margin: 5px 0;">
                        <option value="Cử nhân">Cử nhân</option>
                        <option value="Thạc sĩ">Thạc sĩ</option>
                    </select>
                    <select id="addYear" style="width: 45%; margin: 5px 0;">
                        <!-- JS sẽ tự động điền năm vào đây -->
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>GV Hướng dẫn *</label>
                <input type="text" id="addAdvisor" placeholder="Tên giảng viên" style="width: 100%;">
            </div>
            <div class="form-group">
                <label>Phân loại</label>
                <select id="addCategory" style="width: 100%;">
                    <option value="Bộ câu hỏi">Bộ câu hỏi</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button id="btnSaveData">Lưu dữ liệu</button>
            </div>
            <div class="form-group hidden" id="btnCancelEditContainer">
                <label>&nbsp;</label>
                <button id="btnCancelEdit" class="btn-danger">Hủy sửa</button>
            </div>
        </div>
    </div>

    <!-- Tìm kiếm và Lọc -->
    <div class="form-grid" style="background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px;">
        <div class="form-group" style="grid-column: span 3;">
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên đề tài, tác giả, lớp hoặc GVHD..." style="width: 100%;">
        </div>
        <div class="form-group">
            <select id="filterSelect" style="width: 100%;">
                <option value="Tất cả">Tất cả phân loại</option>
                <option value="Bộ câu hỏi">Bộ câu hỏi</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
    </div>

    <!-- Bảng hiển thị -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th style="min-width: 250px;">Tên Đề Tài</th>
                    <th>Sinh Viên</th>
                    <th>Lớp</th>
                    <th>GV Hướng Dẫn</th>
                    <th>Phân Loại</th>
                    <th id="thAction" class="hidden" style="text-align: center;">Hành động</th>
                </tr>
            </thead>
            <tbody id="dataTableBody">
                <tr><td colspan="7" style="text-align: center; padding: 30px;">Đang tải dữ liệu từ máy chủ...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- NHÚNG FIREBASE BẰNG CDN -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

    // CẤU HÌNH CỦA BẠN
    const firebaseConfig = {
        apiKey: "AIzaSyDxZZRBDcb9606mNYXxXeLpgK2p1xfGF9A",
        authDomain: "theses-3fdce.firebaseapp.com",
        projectId: "theses-3fdce",
        storageBucket: "theses-3fdce.firebasestorage.app",
        messagingSenderId: "660887163293",
        appId: "1:660887163293:web:caeaece108f6fd96cddf74",
        measurementId: "G-5LR1NLCMT0"
    };

    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Biến toàn cục
    let allTheses = [];
    let isAdmin = false;
    let isEditing = false; 

    // Elements
    const tableBody = document.getElementById('dataTableBody');
    const thAction = document.getElementById('thAction');
    
    const loginSection = document.getElementById('loginSection');
    const adminSection = document.getElementById('adminSection');
    const btnLoginShow = document.getElementById('btnLoginShow');
    const btnLogout = document.getElementById('btnLogout');
    
    const addTitle = document.getElementById('addTitle');
    const addAuthor = document.getElementById('addAuthor');
    const addLevel = document.getElementById('addLevel');
    const addYear = document.getElementById('addYear');
    const addAdvisor = document.getElementById('addAdvisor');
    const addCategory = document.getElementById('addCategory');
    const editId = document.getElementById('editId');
    
    const formTitle = document.getElementById('formTitle');
    const editModeBadge = document.getElementById('editModeBadge');
    const btnCancelEditContainer = document.getElementById('btnCancelEditContainer');
    const btnCancelEdit = document.getElementById('btnCancelEdit');

    // === LOGIC CẬP NHẬT NĂM THEO HỆ ĐÀO TẠO ===
    function populateYears(levelType) {
        addYear.innerHTML = '';
        const currentYear = new Date().getFullYear();
        const startYear = (levelType === 'Cử nhân') ? 2017 : 2019;
        
        for (let y = startYear; y <= currentYear; y++) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            addYear.appendChild(option);
        }
        addYear.value = currentYear; // Mặc định chọn năm hiện tại
    }

    // Khi thay đổi hệ (Cử nhân / Thạc sĩ) thì tính toán lại danh sách năm
    addLevel.addEventListener('change', (e) => {
        populateYears(e.target.value);
    });

    // Khởi tạo danh sách năm lúc vừa load web
    populateYears('Cử nhân');

    // === LẮNG NGHE ĐĂNG NHẬP ===
    onAuthStateChanged(auth, (user) => {
        if (user) {
            isAdmin = true;
            btnLoginShow.classList.add('hidden');
            btnLogout.classList.remove('hidden');
            loginSection.classList.add('hidden');
            adminSection.classList.remove('hidden');
            thAction.classList.remove('hidden');
        } else {
            isAdmin = false;
            resetForm(); 
            btnLoginShow.classList.remove('hidden');
            btnLogout.classList.add('hidden');
            adminSection.classList.add('hidden');
            thAction.classList.add('hidden');
        }
        renderTable();
    });

    // === TẢI DỮ LIỆU TỪ FIREBASE ===
    onSnapshot(collection(db, "theses"), (snapshot) => {
        allTheses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable();
    });

    // === VẼ BẢNG & LỌC DỮ LIỆU ===
    function renderTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const filterCat = document.getElementById('filterSelect').value;

        const filtered = allTheses.filter(t => {
            const txtTitle = (t.title || '').toLowerCase();
            const txtAuthor = (t.author || '').toLowerCase();
            const txtClass = (t.studentClass || '').toLowerCase(); 
            const txtAdvisor = (t.advisor || '').toLowerCase();
            
            const matchSearch = txtTitle.includes(searchText) || txtAuthor.includes(searchText) || txtClass.includes(searchText) || txtAdvisor.includes(searchText);
            const matchCat = filterCat === 'Tất cả' || t.category === filterCat;
            
            return matchSearch && matchCat;
        });

        tableBody.innerHTML = '';
        if (filtered.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #64748b; padding: 20px;">Không tìm thấy đề tài nào phù hợp</td></tr>';
            return;
        }

        filtered.forEach((t, index) => {
            const tr = document.createElement('tr');
            
            let actionHtml = '';
            if (isAdmin) {
                const dataString = encodeURIComponent(JSON.stringify(t));
                actionHtml = `
                    <td style="text-align: center; white-space: nowrap;">
                        <button class="btn-sm btn-warning" onclick="triggerEdit('${dataString}')">Sửa</button>
                        <button class="btn-sm btn-danger" onclick="deleteThesis('${t.id}')">Xóa</button>
                    </td>
                `;
            }

            tr.innerHTML = `
                <td style="color: #94a3b8; font-weight: bold; text-align: center;">${index + 1}</td>
                <td style="font-weight: 600; color: #0f172a; white-space: normal; line-height: 1.4;">${t.title}</td>
                <td><span style="font-weight: 500;">${t.author}</span></td>
                <td>${t.studentClass || '—'}</td>
                <td>${t.advisor}</td>
                <td><span class="tag">${t.category}</span></td>
                ${actionHtml}
            `;
            tableBody.appendChild(tr);
        });
    }

    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('filterSelect').addEventListener('change', renderTable);

    // === XỬ LÝ ĐĂNG NHẬP/ĐĂNG XUẤT ===
    btnLoginShow.onclick = () => loginSection.classList.toggle('hidden');
    
    document.getElementById('btnLoginSubmit').onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return alert("Nhập đủ email và mật khẩu");
        
        signInWithEmailAndPassword(auth, e, p)
            .then(() => { document.getElementById('password').value = ''; })
            .catch(err => alert("Sai email hoặc mật khẩu!"));
    };

    btnLogout.onclick = () => signOut(auth);

    // === LƯU DỮ LIỆU (THÊM HOẶC SỬA) ===
    document.getElementById('btnSaveData').onclick = async () => {
        const title = addTitle.value.trim();
        const author = addAuthor.value.trim();
        const advisor = addAdvisor.value.trim();
        const category = addCategory.value;
        
        // Gộp Hệ và Năm thành 1 chuỗi lưu vào database. VD: "Cử nhân - 2021"
        const studentClass = `${addLevel.value} - ${addYear.value}`;
        const currentId = editId.value;

        if(!title || !author || !advisor) {
            return alert("Vui lòng điền đầy đủ các trường có dấu *");
        }

        const dataObj = { title, author, studentClass, advisor, category };

        try {
            if (isEditing && currentId) {
                await updateDoc(doc(db, "theses", currentId), dataObj);
                alert("Đã cập nhật thành công!");
            } else {
                await addDoc(collection(db, "theses"), dataObj);
                alert("Đã thêm đề tài mới!");
            }
            resetForm();
        } catch (error) {
            console.error(error);
            alert("Lỗi! Kiểm tra lại quyền Admin hoặc kết nối mạng.");
        }
    };

    // === CHUẨN BỊ FORM ĐỂ SỬA ===
    window.triggerEdit = (encodedData) => {
        const t = JSON.parse(decodeURIComponent(encodedData));
        
        editId.value = t.id;
        addTitle.value = t.title || '';
        addAuthor.value = t.author || '';
        addAdvisor.value = t.advisor || '';
        addCategory.value = t.category || 'Bộ câu hỏi';

        // Tách chuỗi Lớp (VD: "Cử nhân - 2020") ra để map lại vào form
        if (t.studentClass && t.studentClass.includes(' - ')) {
            const parts = t.studentClass.split(' - ');
            addLevel.value = parts[0];
            populateYears(parts[0]); // Load lại danh sách năm theo hệ
            addYear.value = parts[1];
        } else {
            addLevel.value = 'Cử nhân';
            populateYears('Cử nhân');
        }

        isEditing = true;
        formTitle.innerHTML = 'Sửa thông tin đề tài';
        editModeBadge.classList.remove('hidden');
        btnCancelEditContainer.classList.remove('hidden');
        document.getElementById('btnSaveData').innerHTML = 'Cập nhật';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // === HỦY SỬA ===
    btnCancelEdit.onclick = () => resetForm();

    function resetForm() {
        isEditing = false;
        editId.value = '';
        addTitle.value = '';
        addAuthor.value = '';
        addAdvisor.value = '';
        addLevel.value = 'Cử nhân';
        populateYears('Cử nhân'); // Reset lại năm
        
        formTitle.innerHTML = 'Thêm đề tài mới';
        editModeBadge.classList.add('hidden');
        btnCancelEditContainer.classList.add('hidden');
        document.getElementById('btnSaveData').innerHTML = 'Lưu dữ liệu';
    }

    // === XÓA ĐỀ TÀI ===
    window.deleteThesis = async (id) => {
        if(confirm("Hành động này không thể hoàn tác. Bạn chắc chắn muốn xóa đề tài này?")) {
            try {
                await deleteDoc(doc(db, "theses", id));
            } catch (error) {
                alert("Lỗi khi xóa dữ liệu!");
            }
        }
    };
</script>

</body>
</html>
